services:
  db:
    image: postgres:15
    container_name: ecoair_db
    restart: always
    environment:
      POSTGRES_USER: user_ecoair
      POSTGRES_PASSWORD: password_ecoair
      POSTGRES_DB: ecoair_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: